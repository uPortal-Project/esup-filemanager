spring.mvc.hiddenmethod.filter.enabled=true
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=false
spring.web.resources.cache.cachecontrol.max-age=1d
spring.web.resources.cache.cachecontrol.cache-public=true
spring.web.resources.chain.enabled=true
spring.web.resources.chain.strategy.content.enabled=true
spring.web.resources.chain.strategy.content.paths=/**
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB
server.tomcat.max-swallow-size=-1
# Do not persist HTTP sessions across embedded Tomcat/devtools restarts.
# Session-scoped storage access beans hold live network resources that cannot
# be serialized/reused safely after a restart.
server.servlet.session.persistent=false
logging.pattern.console=%d{yyyy-MMM-dd HH:mm:ss.SSS} [%thread] %highlight(%-5level) %cyan(%logger{15}:%line)- %msg %n
logging.level.org.esupportail=debug
# no cache on thymeleaf templates
# spring.thymeleaf.cache=false

# CAS
cas.url=http://localhost:8081/cas
cas.service=http://localhost:8080
cas.clearpass.key=/opt/secure/clear-pass-example-private.p8

# Role admin for javaperf access
security.role.admin=cn=admin,ou=groups,dc=example,dc=org

# Secondary storage authentication throttling (Samba/SFTP/WebDAV form auth)
security.secondary-auth.rate-limit.enabled=true
security.secondary-auth.rate-limit.capacity=5
security.secondary-auth.rate-limit.refill-tokens=5
security.secondary-auth.rate-limit.refill-period=1m
security.secondary-auth.rate-limit.max-buckets=10000

# credentials - for production, use vault (with spring-boot integration) or env vars
s3.username=minioadmin
s3.password=minioadmin
samba.username=sambauser
samba.password=sambapass
webdav.username=webdav
webdav.password=webdav
sftp.username=sftpuser
sftp.password=sftppass

