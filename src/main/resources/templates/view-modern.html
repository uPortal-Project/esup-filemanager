<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="mobile-web-app-capable" content="yes">
    <title>ESUP File Manager</title>

    <!-- CSS Bootstrap 5 -->
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/webjars/bootstrap-icons/font/bootstrap-icons.min.css}" />
    <link rel="stylesheet" th:href="@{/webjars/flag-icons/css/flag-icons.min.css}" />

    <!-- CSS Custom -->
    <link rel="stylesheet" th:href="@{/css/esup-stock.css}" type="text/css">
    <link rel="stylesheet" th:href="@{/css/google-open-sans.css}" type="text/css">
    <link rel="stylesheet" th:href="@{/css/file-tree.css}" type="text/css">
    <link rel="stylesheet" th:href="@{/css/esup-responsive.css}" type="text/css">
    <link rel="stylesheet" th:href="@{/css/details-modern.css}" type="text/css">

</head>
<body class="d-flex flex-column min-vh-100">
    <!-- WCAG 2.4.1 skip link -->
    <a href="#rightPanel" class="visually-hidden-focusable" th:text="#{skip.to.main}">Skip to main content</a>

    <script th:inline="javascript">
        /*<![CDATA[*/
        // Global configuration
        var useDoubleClick = /*[[${useDoubleClick}]]*/ '';
        var defaultPath = /*[[${defaultPath}]]*/ '';

        // Endpoint URLs
        var htmlFileTreeURL = '/htmlFileTree';
        var uploadFileURL ='/uploadFile';
        var prepareCopyFilesURL = '/prepareCopyFiles';
        var prepareCutFilesURL ='/prepareCutFiles';
        var pastFilesURL = '/pastFiles';
        var fileChildrenURL = '/fileChildren';
        var detailsAreaURL = '/detailsArea';
        var renameFileURL = '/renameFile';
        var downloadFileURL = '/downloadFile';
        var downloadZipURL = '/downloadZip';
        var removeFilesURL = '/removeFiles';

        // I18N messages exposed to JavaScript
        window.i18n = {
            // Upload - individual file
            uploadFileSuccess       : /*[[#{info.uploadFileSuccess}]]*/ 'File "{0}" uploaded successfully.',
            uploadFileFailed        : /*[[#{info.uploadFileFailed}]]*/ 'Error uploading file "{0}".',
            // Upload - overall summary
            uploadFilesSuccess      : /*[[#{info.uploadFilesSuccess}]]*/ '{0} file(s) uploaded successfully.',
            uploadFilesPartial      : /*[[#{info.uploadFilesPartial}]]*/ '{0} file(s) uploaded, {1} error(s).',
            // Upload - progress panel labels
            uploadingProgress       : /*[[#{info.uploadingProgress}]]*/ 'Uploading ({0}/{1})',
            uploadProgress          : /*[[#{info.uploadProgress}]]*/ '{0} / {1} file(s)',
            uploadErrors            : /*[[#{info.uploadErrors}]]*/ '{0} error(s)',
            // Copy
            copyOk                  : /*[[#{ajax.copy.ok}]]*/ '',
            copyFailed              : /*[[#{error.copyFailed}]]*/ 'Copy failed.',
            itemsCopied             : /*[[#{info.itemsCopied}]]*/ '{0} item(s) copied.',
            // Cut
            cutOk                   : /*[[#{ajax.cut.ok}]]*/ '',
            cutFailed               : /*[[#{error.cutFailed}]]*/ 'Cut failed.',
            itemsCut                : /*[[#{info.itemsCut}]]*/ '{0} item(s) cut.',
            // Paste
            pasteOk                 : /*[[#{ajax.paste.ok}]]*/ '',
            pasteFailed             : /*[[#{ajax.paste.failed}]]*/ '',
            clipboardEmpty          : /*[[#{error.clipboardEmpty}]]*/ 'Clipboard is empty.',
            // Delete
            removeOk                : /*[[#{ajax.remove.ok}]]*/ '',
            removeFailed            : /*[[#{ajax.remove.failed}]]*/ '',
            deleteConfirmTitle      : /*[[#{delete.confirm.title}]]*/ 'Delete confirmation',
            deleteConfirmMessage    : /*[[#{delete.confirm.message}]]*/ 'These items will be deleted permanently. Are you sure?',
            deleteConfirmOk         : /*[[#{delete.confirm.ok}]]*/ 'Ok',
            deleteConfirmCancel     : /*[[#{delete.confirm.cancel}]]*/ 'Cancel',
            deleteButton            : /*[[#{toolbar.delete.button}]]*/ 'Delete',
            // Rename
            renameTitle             : /*[[#{dialog.rename.title}]]*/ 'Rename',
            renameButton            : /*[[#{dialog.rename.button}]]*/ 'Rename',
            renameSuccess           : /*[[#{ajax.rename.success}]]*/ '',
            renameFailed            : /*[[#{ajax.rename.failed}]]*/ '',
            // Create folder
            createSuccess           : /*[[#{ajax.fileOrFolderCreate.success}]]*/ '',
            createFailed            : /*[[#{ajax.fileOrFolderCreate.failed}]]*/ '',
            createButton            : /*[[#{toolbar.create.button}]]*/ 'Create',
            newFolderPlaceholder    : /*[[#{dialog.newFolder.placeholder}]]*/ 'Folder name',
            // Toolbar labels (context menus)
            refresh                 : /*[[#{toolbar.refresh}]]*/ 'Refresh',
            newFolder               : /*[[#{toolbar.create}]]*/ 'New Folder',
            paste                   : /*[[#{toolbar.paste}]]*/ 'Paste',
            download                : /*[[#{toolbar.download}]]*/ 'Download',
            copy                    : /*[[#{toolbar.copy}]]*/ 'Copy',
            cut                     : /*[[#{toolbar.cut}]]*/ 'Cut',
            rename                  : /*[[#{toolbar.rename}]]*/ 'Rename',
            delete_                 : /*[[#{toolbar.delete}]]*/ 'Delete',
            // Authentication
            authOk                  : /*[[#{auth.ok}]]*/ '',
            authBad                 : /*[[#{auth.bad}]]*/ '',
            authMissingCredentials  : /*[[#{auth.missingCredentials}]]*/ 'Please enter your username and password.',
            authError               : /*[[#{auth.error}]]*/ 'Authentication error. Please try again.',
            // General errors
            noFileSelected          : /*[[#{error.noFileSelected}]]*/ 'No file selected.',
            directoryLoadingError   : /*[[#{error.directoryLoading}]]*/ 'Error loading directory.',
            refreshFailed           : /*[[#{error.refreshFailed}]]*/ 'Error refreshing view.',
            sortFailed              : /*[[#{error.sortFailed}]]*/ 'Error sorting files.',
            selectOneItem           : /*[[#{error.selectOneItem}]]*/ 'Please select exactly one item.',
            cannotFindFile          : /*[[#{error.cannotFindFile}]]*/ 'Cannot find selected file.',
            cannotRetrieveFileName  : /*[[#{error.cannotRetrieveFileName}]]*/ 'Cannot retrieve file name.',
            enterFolderName         : /*[[#{error.enterFolderName}]]*/ 'Please enter a folder name.',
            enterNewName            : /*[[#{error.enterNewName}]]*/ 'Please enter a new name.',
            // Info messages
            viewRefreshed           : /*[[#{info.viewRefreshed}]]*/ 'View refreshed.',
            nameUnchanged           : /*[[#{info.nameUnchanged}]]*/ 'Name has not changed.'
        };
        /*]]>*/
    </script>

    <!-- JS - Bootstrap first -->
    <script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.js}"></script>

    <!-- S3 pre-signed URLs -->
    <script type="text/javascript" th:src="@{/js/esup-presigned-urls.js}"></script>

    <!-- Mobile and Responsive support -->
    <script type="text/javascript" th:src="@{/js/esup-mobile-support.js}"></script>

    <!-- Panel Resizer - Modern resize handling -->
    <script type="text/javascript" th:src="@{/js/panel-resizer.js}"></script>

    <!-- Details Manager - Modern details block management -->
    <script type="text/javascript" th:src="@{/js/details-manager.js}"></script>

    <!-- ES6 Modules - Modern application -->
    <script type="module" th:src="@{/js/esup-stock-modern.js}"></script>

    <!-- Responsive body content -->
    <div th:replace="~{body-responsive :: body}"></div>
</body>
</html>
