<!-- src/main/resources/templates/details_image.html -->
<div class="details-card">
    <h3 class="details-header" th:text="#{details.header}">Détails</h3>

    <div class="image-preview-container">
        <img th:src="@{/fetchImage(dir=${file.encPath})}"
             class="details-image"
             alt="Image preview"
             th:attr="data-fullsize=@{/fetchImage(dir=${file.encPath})}" />
        <div class="image-zoom-icon" title="Cliquer pour agrandir">🔍</div>
    </div>

    <div class="details-spacer"></div>

    <dl class="details-info">
        <dt class="details-label" th:text="#{details.title}">Nom</dt>
        <dd class="details-value">
            <span th:text="${file.title}"></span>
        </dd>

        <dt class="details-label" th:text="#{details.imagesize}">Dimensions</dt>
        <dd class="details-value">
            <span id="image_width"></span>px × <span id="image_height"></span>px
        </dd>

        <dt class="details-label" th:text="#{details.size}">Taille</dt>
        <dd class="details-value">
            <span th:text="${file.formattedSize.size}"></span>
            <span th:text="#{|details.${file.formattedSize.unit}|}"></span>
        </dd>

        <dt class="details-label" th:text="#{details.type}">Type</dt>
        <dd class="details-value" th:text="${file.mimeType}"></dd>

        <dt class="details-label" th:text="#{details.lastModifiedTime}">Modifié le</dt>
        <dd class="details-value" th:text="${#dates.format(file.lastModifiedTime, datePattern)}"></dd>
    </dl>

    <div class="details-spacer"></div>

    <div class="details-actions">
        <a class="btn-download" th:href="@{/downloadFile(dir=${file.encPath})}" th:text="#{details.download}">Télécharger</a>
        <button class="btn-view-fullsize" onclick="viewImageFullsize(this)" th:text="#{details.viewimage}">Voir en grand</button>
    </div>
</div>

<!-- Modal pour affichage en taille réelle -->
<div id="imageModal" class="image-modal" style="display: none;">
    <div class="image-modal-content">
        <span class="image-modal-close">&times;</span>
        <img id="modalImage" src="" alt="Image en taille réelle">
    </div>
</div>

<div class="details-spacer"></div>
