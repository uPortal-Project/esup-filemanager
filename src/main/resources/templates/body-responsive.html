<!-- src/main/resources/templates/body-responsive.html -->
<!-- Responsive Bootstrap 5 template for desktop, tablet and mobile -->
<div class="container-fluid esupstock p-0" th:fragment="body" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

    <!-- Mobile header with burger menu -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light d-lg-none sticky-top shadow-sm" th:attr="aria-label=#{aria.nav.mobile}">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">
                <i class="bi bi-folder2-open" aria-hidden="true"></i> ESUP File Manager
            </span>
            <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#mobileMenu"
                    aria-controls="mobileMenu" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <span class="navbar-text ms-auto me-2 small" th:if="${#authentication}">
                <i class="bi bi-person-circle" aria-hidden="true"></i>
                <span th:text="${#authentication.principal.username}"></span>
            </span>
        </div>
    </nav>

    <!-- Mobile Offcanvas Menu (Actions + File Tree) -->
    <div class="offcanvas offcanvas-start" tabindex="-1" id="mobileMenu" aria-labelledby="mobileMenuLabel">
        <div class="offcanvas-header">
            <h5 class="offcanvas-title" id="mobileMenuLabel">
                <i class="bi bi-menu-button-wide" aria-hidden="true"></i> Menu
            </h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
        </div>
        <div class="offcanvas-body p-0">
            <!-- Mobile quick actions -->
            <div class="list-group list-group-flush">
                <button class="list-group-item list-group-item-action" id="mobile-upload">
                    <i class="bi bi-cloud-upload" aria-hidden="true"></i> <span th:text="#{toolbar.upload.title}">Upload</span>
                </button>
                <button class="list-group-item list-group-item-action" id="mobile-new-folder">
                    <i class="bi bi-folder-plus" aria-hidden="true"></i> <span th:text="#{toolbar.create.title}">Nouveau dossier</span>
                </button>
                <button class="list-group-item list-group-item-action" id="mobile-refresh">
                    <i class="bi bi-arrow-clockwise" aria-hidden="true"></i> <span th:text="#{toolbar.refresh.title}">Rafraîchir</span>
                </button>
                <div class="dropdown-divider" role="separator"></div>
                <button class="list-group-item list-group-item-action disabled" id="mobile-download" aria-disabled="true">
                    <i class="bi bi-download" aria-hidden="true"></i> <span th:text="#{toolbar.download.title}">Télécharger</span>
                </button>
                <button class="list-group-item list-group-item-action disabled" id="mobile-copy" aria-disabled="true">
                    <i class="bi bi-files" aria-hidden="true"></i> <span th:text="#{toolbar.copy.title}">Copier</span>
                </button>
                <button class="list-group-item list-group-item-action disabled" id="mobile-cut" aria-disabled="true">
                    <i class="bi bi-scissors" aria-hidden="true"></i> <span th:text="#{toolbar.cut.title}">Couper</span>
                </button>
                <button class="list-group-item list-group-item-action disabled" id="mobile-paste" aria-disabled="true">
                    <i class="bi bi-clipboard" aria-hidden="true"></i> <span th:text="#{toolbar.paste.title}">Coller</span>
                </button>
                <button class="list-group-item list-group-item-action disabled" id="mobile-rename" aria-disabled="true">
                    <i class="bi bi-pencil" aria-hidden="true"></i> <span th:text="#{toolbar.rename.title}">Renommer</span>
                </button>
                <button class="list-group-item list-group-item-action disabled" id="mobile-delete" aria-disabled="true">
                    <i class="bi bi-trash" aria-hidden="true"></i> <span th:text="#{toolbar.delete.title}">Supprimer</span>
                </button>
                <div class="dropdown-divider" role="separator"></div>
                <!-- Java Perf link - Admin only -->
                <a sec:authorize="hasRole(@environment.getProperty('security.role.admin'))"
                   th:href="@{/javaperf}"
                   class="list-group-item list-group-item-action text-warning">
                    <i class="bi bi-speedometer2" aria-hidden="true"></i> Java Performance
                </a>
                <div class="dropdown-divider" role="separator"></div>
                <!-- Language selector - Mobile Menu -->
                <div class="list-group-item d-flex align-items-center gap-2" role="group" th:attr="aria-label=#{aria.lang.select}">
                    <i class="bi bi-translate" aria-hidden="true"></i>
                    <button type="button" onclick="switchLanguage('fr')"
                       th:classappend="${#locale.language == 'fr'} ? 'btn btn-sm btn-primary p-1 lh-1' : 'btn btn-sm btn-outline-secondary p-1 lh-1'"
                       th:attr="aria-pressed=${#locale.language == 'fr'}"
                       aria-label="Français"><span class="fi fi-fr" aria-hidden="true"></span></button>
                    <button type="button" onclick="switchLanguage('en')"
                       th:classappend="${#locale.language == 'en'} ? 'btn btn-sm btn-primary p-1 lh-1' : 'btn btn-sm btn-outline-secondary p-1 lh-1'"
                       th:attr="aria-pressed=${#locale.language == 'en'}"
                       aria-label="English"><span class="fi fi-gb" aria-hidden="true"></span></button>
                    <button type="button" onclick="switchLanguage('de')"
                       th:classappend="${#locale.language == 'de'} ? 'btn btn-sm btn-primary p-1 lh-1' : 'btn btn-sm btn-outline-secondary p-1 lh-1'"
                       th:attr="aria-pressed=${#locale.language == 'de'}"
                       aria-label="Deutsch"><span class="fi fi-de" aria-hidden="true"></span></button>
                    <button type="button" onclick="switchLanguage('es')"
                       th:classappend="${#locale.language == 'es'} ? 'btn btn-sm btn-primary p-1 lh-1' : 'btn btn-sm btn-outline-secondary p-1 lh-1'"
                       th:attr="aria-pressed=${#locale.language == 'es'}"
                       aria-label="Español"><span class="fi fi-es" aria-hidden="true"></span></button>
                </div>
            </div>

            <!-- File tree in mobile menu -->
            <div class="p-3 bg-light border-top">
                <h6 class="text-muted mb-2" th:text="#{treearea.header}">Arborescence</h6>
                <div id="fileTreeMobile" class="small"></div>
            </div>
        </div>
    </div>

    <!-- Desktop Toolbar (hidden on mobile) -->
    <div id="toolbar" class="d-none d-lg-flex bg-light border-bottom p-3 flex-wrap align-items-center shadow-sm">
        <div class="btn-group btn-group-sm me-2 mb-2" role="group">
            <button type="button" class="btn btn-outline-primary" id="toolbar-refresh"
                    th:title="#{toolbar.refresh.title}"
                    th:attr="aria-label=#{toolbar.refresh.title}">
                <i class="bi bi-arrow-clockwise" aria-hidden="true"></i>
                <span class="d-none d-xl-inline" th:text="#{toolbar.refresh}">Rafraîchir</span>
            </button>
        </div>

        <div class="btn-group btn-group-sm me-2 mb-2" role="group">
            <button type="button" class="btn btn-outline-success" id="toolbar-upload"
                    th:title="#{toolbar.upload.title}"
                    th:attr="aria-label=#{toolbar.upload.title}">
                <i class="bi bi-cloud-upload" aria-hidden="true"></i>
                <span class="d-none d-xl-inline" th:text="#{toolbar.upload}">Upload</span>
            </button>
            <button type="button" class="btn btn-outline-success" id="toolbar-new_folder"
                    th:title="#{toolbar.create.title}"
                    th:attr="aria-label=#{toolbar.create.title}">
                <i class="bi bi-folder-plus" aria-hidden="true"></i>
                <span class="d-none d-xl-inline" th:text="#{toolbar.create}">Nouveau dossier</span>
            </button>
        </div>

        <div class="btn-group btn-group-sm me-2 mb-2" role="group">
            <button type="button" class="btn btn-outline-info disabled" id="toolbar-download"
                    th:title="#{toolbar.download.title}"
                    th:attr="aria-label=#{toolbar.download.title}"
                    aria-disabled="true">
                <i class="bi bi-download" aria-hidden="true"></i>
                <span class="d-none d-xl-inline" th:text="#{toolbar.download}">Télécharger</span>
            </button>
            <button type="button" class="btn btn-outline-info disabled" id="toolbar-zip"
                    th:title="#{toolbar.zip.title}"
                    th:attr="aria-label=#{toolbar.zip.title}"
                    aria-disabled="true">
                <i class="bi bi-file-zip" aria-hidden="true"></i>
                <span class="d-none d-xl-inline" th:text="#{toolbar.zip}">ZIP</span>
            </button>
        </div>

        <div class="btn-group btn-group-sm me-2 mb-2" role="group">
            <button type="button" class="btn btn-outline-secondary disabled" id="toolbar-copy"
                    th:title="#{toolbar.copy.title}"
                    th:attr="aria-label=#{toolbar.copy.title}"
                    aria-disabled="true">
                <i class="bi bi-files" aria-hidden="true"></i>
                <span class="d-none d-xl-inline" th:text="#{toolbar.copy}">Copier</span>
            </button>
            <button type="button" class="btn btn-outline-secondary disabled" id="toolbar-cut"
                    th:title="#{toolbar.cut.title}"
                    th:attr="aria-label=#{toolbar.cut.title}"
                    aria-disabled="true">
                <i class="bi bi-scissors" aria-hidden="true"></i>
                <span class="d-none d-xl-inline" th:text="#{toolbar.cut}">Couper</span>
            </button>
            <button type="button" class="btn btn-outline-secondary disabled" id="toolbar-paste"
                    th:title="#{toolbar.paste.title}"
                    th:attr="aria-label=#{toolbar.paste.title}"
                    aria-disabled="true">
                <i class="bi bi-clipboard" aria-hidden="true"></i>
                <span class="d-none d-xl-inline" th:text="#{toolbar.paste}">Coller</span>
            </button>
        </div>

        <div class="btn-group btn-group-sm me-2 mb-2" role="group">
            <button type="button" class="btn btn-outline-warning disabled" id="toolbar-rename"
                    th:title="#{toolbar.rename.title}"
                    th:attr="aria-label=#{toolbar.rename.title}"
                    aria-disabled="true">
                <i class="bi bi-pencil" aria-hidden="true"></i>
                <span class="d-none d-xl-inline" th:text="#{toolbar.rename}">Renommer</span>
            </button>
            <button type="button" class="btn btn-outline-danger disabled" id="toolbar-delete"
                    th:title="#{toolbar.delete.title}"
                    th:attr="aria-label=#{toolbar.delete.title}"
                    aria-disabled="true">
                <i class="bi bi-trash" aria-hidden="true"></i>
                <span class="d-none d-xl-inline" th:text="#{toolbar.delete}">Supprimer</span>
            </button>
        </div>

        <div class="ms-auto mb-2 d-flex align-items-center gap-2">
            <!-- Language selector - Desktop Toolbar -->
            <div class="d-flex align-items-center gap-1 me-2" id="lang-switcher-toolbar" role="group" th:attr="aria-label=#{aria.lang.select}">
                <button type="button" onclick="switchLanguage('fr')"
                   th:classappend="${#locale.language == 'fr'} ? 'btn btn-sm btn-primary p-1 lh-1' : 'btn btn-sm btn-outline-secondary p-1 lh-1'"
                   th:attr="aria-pressed=${#locale.language == 'fr'}"
                   aria-label="Français"><span class="fi fi-fr" aria-hidden="true"></span></button>
                <button type="button" onclick="switchLanguage('en')"
                   th:classappend="${#locale.language == 'en'} ? 'btn btn-sm btn-primary p-1 lh-1' : 'btn btn-sm btn-outline-secondary p-1 lh-1'"
                   th:attr="aria-pressed=${#locale.language == 'en'}"
                   aria-label="English"><span class="fi fi-gb" aria-hidden="true"></span></button>
                <button type="button" onclick="switchLanguage('de')"
                   th:classappend="${#locale.language == 'de'} ? 'btn btn-sm btn-primary p-1 lh-1' : 'btn btn-sm btn-outline-secondary p-1 lh-1'"
                   th:attr="aria-pressed=${#locale.language == 'de'}"
                   aria-label="Deutsch"><span class="fi fi-de" aria-hidden="true"></span></button>
                <button type="button" onclick="switchLanguage('es')"
                   th:classappend="${#locale.language == 'es'} ? 'btn btn-sm btn-primary p-1 lh-1' : 'btn btn-sm btn-outline-secondary p-1 lh-1'"
                   th:attr="aria-pressed=${#locale.language == 'es'}"
                   aria-label="Español"><span class="fi fi-es" aria-hidden="true"></span></button>
            </div>
            <!-- Java Perf link - Admin only -->
            <a sec:authorize="hasRole(@environment.getProperty('security.role.admin'))"
               th:href="@{/javaperf}"
               class="btn btn-sm btn-outline-warning d-inline-flex align-items-center gap-1 me-1"
               aria-label="Java Performance">
                <i class="bi bi-speedometer2" aria-hidden="true"></i>
                <span class="d-none d-xl-inline">Java Perf</span>
            </a>
            <a th:href="@{/logout}" class="btn btn-sm btn-outline-dark d-inline-flex align-items-center gap-2" id="toolbar-logout"
               th:attr="aria-label=#{toolbar.logout} + ' – ' + ${#authentication.principal.username}">
                <i class="bi bi-person-circle" aria-hidden="true"></i>
                <span th:text="${#authentication.principal.username}">User</span>
                <i class="bi bi-box-arrow-right" aria-hidden="true"></i>
            </a>
        </div>
    </div>

    <!-- Info Toolbar -->
    <div id="info-toolbar" class="alert alert-info alert-dismissible fade show d-none m-2" role="alert" aria-live="polite">
        <span id="info-toolbar-message"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <!-- Main Content Area with modern splitter -->
    <div class="main-content-wrapper">
        <!-- Left Panel - File Tree (Desktop only) -->
        <aside id="leftPanel" class="left-panel d-none d-lg-flex" th:attr="aria-label=#{aria.panel.files}">
            <div class="panel-content">
                <!-- Tree header -->
                <div class="panel-header">
                    <h2 class="h6 mb-0">
                        <i class="bi bi-folder-tree me-2" aria-hidden="true"></i>
                        <span th:text="#{treearea.header}">Arborescence</span>
                    </h2>
                </div>

                <!-- File Tree -->
                <div id="arborescentArea" class="panel-body flex-grow-1">
                    <div id="fileTree" th:text="#{error.javascriptengine}">Chargement...</div>
                </div>

                <!-- Details Area -->
                <div id="detailArea" class="panel-footer"></div>
            </div>

            <!-- Splitter / Resize Handle -->
            <div class="panel-splitter" id="treeSplitter"
                 tabindex="0"
                 role="separator"
                 aria-orientation="vertical"
                 th:attr="aria-label=#{aria.splitter.label}"
                 aria-valuenow="280" aria-valuemin="200" aria-valuemax="500">
                <div class="splitter-handle">
                    <i class="bi bi-three-dots-vertical" aria-hidden="true"></i>
                </div>
            </div>
        </aside>

        <!-- Right Panel - Browser Area -->
        <main id="rightPanel" class="right-panel" th:attr="aria-label=#{aria.panel.main}">
            <!-- Browser Main Content -->
            <div id="browserArea" class="browser-content">
                <div id="browserMain"></div>
            </div>
        </main>
    </div>

    <!-- Mobile Bottom Toolbar (Quick actions) -->
    <div class="d-lg-none bg-light border-top fixed-bottom">
        <div class="btn-group w-100" role="group" th:attr="aria-label=#{aria.bottom.toolbar}">
            <button type="button" class="btn btn-light border-0 py-3" id="mobile-toolbar-upload"
                    th:attr="aria-label=#{toolbar.upload.title}">
                <i class="bi bi-cloud-upload fs-5" aria-hidden="true"></i>
                <div class="small" th:text="#{toolbar.upload}">Upload</div>
            </button>
            <button type="button" class="btn btn-light border-0 py-3" id="mobile-toolbar-new"
                    th:attr="aria-label=#{toolbar.create.title}">
                <i class="bi bi-folder-plus fs-5" aria-hidden="true"></i>
                <div class="small" th:text="#{toolbar.create}">Nouveau dossier</div>
            </button>
            <button type="button" class="btn btn-light border-0 py-3 disabled" id="mobile-toolbar-download"
                    th:attr="aria-label=#{toolbar.download.title}"
                    aria-disabled="true">
                <i class="bi bi-download fs-5" aria-hidden="true"></i>
                <div class="small" th:text="#{toolbar.download}">Télécharger</div>
            </button>
            <button type="button" class="btn btn-light border-0 py-3"
                    data-bs-toggle="offcanvas" data-bs-target="#mobileMenu"
                    aria-controls="mobileMenu" th:attr="aria-label=#{treearea.header}">
                <i class="bi bi-list fs-5" aria-hidden="true"></i>
                <div class="small">Menu</div>
            </button>
        </div>
    </div>


    <!-- Language switch function: appends ?lang=xx to the current URL -->
    <script>
        function switchLanguage(lang) {
            var url = new URL(window.location.href);
            url.searchParams.set('lang', lang);
            window.location.replace(url.toString());
        }
    </script>
</div>
