<!-- src/main/resources/templates/body-responsive.html -->
<!-- Template responsive Bootstrap 5 pour desktop, tablette et mobile -->
<div class="container-fluid esupstock p-0" th:fragment="body">

    <!-- Mobile Header avec burger menu -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light d-lg-none sticky-top shadow-sm">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">
                <i class="bi bi-folder2-open"></i> ESUP File Manager
            </span>
            <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#mobileMenu"
                    aria-controls="mobileMenu" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <span class="navbar-text ms-auto me-2 small" th:if="${#authentication}">
                <i class="bi bi-person-circle"></i>
                <span th:text="${#authentication.principal.username}"></span>
            </span>
        </div>
    </nav>

    <!-- Offcanvas Menu Mobile (Actions + Arborescence) -->
    <div class="offcanvas offcanvas-start" tabindex="-1" id="mobileMenu" aria-labelledby="mobileMenuLabel">
        <div class="offcanvas-header">
            <h5 class="offcanvas-title" id="mobileMenuLabel">
                <i class="bi bi-menu-button-wide"></i> Menu
            </h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
        </div>
        <div class="offcanvas-body p-0">
            <!-- Actions rapides mobile -->
            <div class="list-group list-group-flush">
                <button class="list-group-item list-group-item-action" id="mobile-upload">
                    <i class="bi bi-cloud-upload"></i> <span th:text="#{toolbar.upload.title}">Upload</span>
                </button>
                <button class="list-group-item list-group-item-action" id="mobile-new-folder">
                    <i class="bi bi-folder-plus"></i> <span th:text="#{toolbar.create.title}">Nouveau dossier</span>
                </button>
                <button class="list-group-item list-group-item-action" id="mobile-refresh">
                    <i class="bi bi-arrow-clockwise"></i> <span th:text="#{toolbar.refresh.title}">Rafraîchir</span>
                </button>
                <div class="dropdown-divider"></div>
                <button class="list-group-item list-group-item-action disabled" id="mobile-download">
                    <i class="bi bi-download"></i> <span th:text="#{toolbar.download.title}">Télécharger</span>
                </button>
                <button class="list-group-item list-group-item-action disabled" id="mobile-copy">
                    <i class="bi bi-files"></i> <span th:text="#{toolbar.copy.title}">Copier</span>
                </button>
                <button class="list-group-item list-group-item-action disabled" id="mobile-cut">
                    <i class="bi bi-scissors"></i> <span th:text="#{toolbar.cut.title}">Couper</span>
                </button>
                <button class="list-group-item list-group-item-action disabled" id="mobile-paste">
                    <i class="bi bi-clipboard"></i> <span th:text="#{toolbar.paste.title}">Coller</span>
                </button>
                <button class="list-group-item list-group-item-action disabled" id="mobile-rename">
                    <i class="bi bi-pencil"></i> <span th:text="#{toolbar.rename.title}">Renommer</span>
                </button>
                <button class="list-group-item list-group-item-action disabled" id="mobile-delete">
                    <i class="bi bi-trash"></i> <span th:text="#{toolbar.delete.title}">Supprimer</span>
                </button>
                <div class="dropdown-divider"></div>
                <!-- Sélecteur de langue - Menu Mobile -->
                <div class="list-group-item d-flex align-items-center gap-2">
                    <i class="bi bi-translate"></i>
                    <a href="javascript:void(0)" onclick="switchLanguage('fr')"
                       th:class="${#locale.language == 'fr'} ? 'btn btn-sm btn-primary p-1 lh-1' : 'btn btn-sm btn-outline-secondary p-1 lh-1'"
                       title="Français"><span class="fi fi-fr"></span></a>
                    <a href="javascript:void(0)" onclick="switchLanguage('en')"
                       th:class="${#locale.language == 'en'} ? 'btn btn-sm btn-primary p-1 lh-1' : 'btn btn-sm btn-outline-secondary p-1 lh-1'"
                       title="English"><span class="fi fi-gb"></span></a>
                    <a href="javascript:void(0)" onclick="switchLanguage('de')"
                       th:class="${#locale.language == 'de'} ? 'btn btn-sm btn-primary p-1 lh-1' : 'btn btn-sm btn-outline-secondary p-1 lh-1'"
                       title="Deutsch"><span class="fi fi-de"></span></a>
                    <a href="javascript:void(0)" onclick="switchLanguage('es')"
                       th:class="${#locale.language == 'es'} ? 'btn btn-sm btn-primary p-1 lh-1' : 'btn btn-sm btn-outline-secondary p-1 lh-1'"
                       title="Español"><span class="fi fi-es"></span></a>
                </div>
            </div>

            <!-- Arborescence dans le menu mobile -->
            <div class="p-3 bg-light border-top">
                <h6 class="text-muted mb-2" th:text="#{treearea.header}">Arborescence</h6>
                <div id="fileTreeMobile" class="small"></div>
            </div>
        </div>
    </div>

    <!-- Toolbar Desktop (caché sur mobile) -->
    <div id="toolbar" class="d-none d-lg-flex bg-light border-bottom p-3 flex-wrap align-items-center shadow-sm">
        <div class="btn-group btn-group-sm me-2 mb-2" role="group">
            <button type="button" class="btn btn-outline-primary" id="toolbar-refresh" th:title="#{toolbar.refresh.title}">
                <i class="bi bi-arrow-clockwise"></i>
                <span class="d-none d-xl-inline" th:text="#{toolbar.refresh}">Rafraîchir</span>
            </button>
        </div>

        <div class="btn-group btn-group-sm me-2 mb-2" role="group">
            <button type="button" class="btn btn-outline-success" id="toolbar-upload" th:title="#{toolbar.upload.title}">
                <i class="bi bi-cloud-upload"></i>
                <span class="d-none d-xl-inline" th:text="#{toolbar.upload}">Upload</span>
            </button>
            <button type="button" class="btn btn-outline-success" id="toolbar-new_folder" th:title="#{toolbar.create.title}">
                <i class="bi bi-folder-plus"></i>
                <span class="d-none d-xl-inline" th:text="#{toolbar.create}">Nouveau dossier</span>
            </button>
        </div>

        <div class="btn-group btn-group-sm me-2 mb-2" role="group">
            <button type="button" class="btn btn-outline-info disabled" id="toolbar-download" th:title="#{toolbar.download.title}">
                <i class="bi bi-download"></i>
                <span class="d-none d-xl-inline" th:text="#{toolbar.download}">Télécharger</span>
            </button>
            <button type="button" class="btn btn-outline-info disabled" id="toolbar-zip" th:title="#{toolbar.zip.title}">
                <i class="bi bi-file-zip"></i>
                <span class="d-none d-xl-inline" th:text="#{toolbar.zip}">ZIP</span>
            </button>
        </div>

        <div class="btn-group btn-group-sm me-2 mb-2" role="group">
            <button type="button" class="btn btn-outline-secondary disabled" id="toolbar-copy" th:title="#{toolbar.copy.title}">
                <i class="bi bi-files"></i>
                <span class="d-none d-xl-inline" th:text="#{toolbar.copy}">Copier</span>
            </button>
            <button type="button" class="btn btn-outline-secondary disabled" id="toolbar-cut" th:title="#{toolbar.cut.title}">
                <i class="bi bi-scissors"></i>
                <span class="d-none d-xl-inline" th:text="#{toolbar.cut}">Couper</span>
            </button>
            <button type="button" class="btn btn-outline-secondary disabled" id="toolbar-paste" th:title="#{toolbar.paste.title}">
                <i class="bi bi-clipboard"></i>
                <span class="d-none d-xl-inline" th:text="#{toolbar.paste}">Coller</span>
            </button>
        </div>

        <div class="btn-group btn-group-sm me-2 mb-2" role="group">
            <button type="button" class="btn btn-outline-warning disabled" id="toolbar-rename" th:title="#{toolbar.rename.title}">
                <i class="bi bi-pencil"></i>
                <span class="d-none d-xl-inline" th:text="#{toolbar.rename}">Renommer</span>
            </button>
            <button type="button" class="btn btn-outline-danger disabled" id="toolbar-delete" th:title="#{toolbar.delete.title}">
                <i class="bi bi-trash"></i>
                <span class="d-none d-xl-inline" th:text="#{toolbar.delete}">Supprimer</span>
            </button>
        </div>

        <div class="ms-auto mb-2 d-flex align-items-center gap-2">
            <!-- Sélecteur de langue - Desktop Toolbar -->
            <div class="d-flex align-items-center gap-1 me-2" id="lang-switcher-toolbar">
                <a href="javascript:void(0)" onclick="switchLanguage('fr')"
                   th:class="${#locale.language == 'fr'} ? 'btn btn-sm btn-primary p-1 lh-1' : 'btn btn-sm btn-outline-secondary p-1 lh-1'"
                   title="Français" aria-label="Français"><span class="fi fi-fr"></span></a>
                <a href="javascript:void(0)" onclick="switchLanguage('en')"
                   th:class="${#locale.language == 'en'} ? 'btn btn-sm btn-primary p-1 lh-1' : 'btn btn-sm btn-outline-secondary p-1 lh-1'"
                   title="English" aria-label="English"><span class="fi fi-gb"></span></a>
                <a href="javascript:void(0)" onclick="switchLanguage('de')"
                   th:class="${#locale.language == 'de'} ? 'btn btn-sm btn-primary p-1 lh-1' : 'btn btn-sm btn-outline-secondary p-1 lh-1'"
                   title="Deutsch" aria-label="Deutsch"><span class="fi fi-de"></span></a>
                <a href="javascript:void(0)" onclick="switchLanguage('es')"
                   th:class="${#locale.language == 'es'} ? 'btn btn-sm btn-primary p-1 lh-1' : 'btn btn-sm btn-outline-secondary p-1 lh-1'"
                   title="Español" aria-label="Español"><span class="fi fi-es"></span></a>
            </div>
            <a th:href="@{/logout}" class="btn btn-sm btn-outline-dark d-inline-flex align-items-center gap-2" id="toolbar-logout" th:title="#{toolbar.logout}">
                <i class="bi bi-person-circle"></i>
                <span th:text="${#authentication.principal.username}">User</span>
                <i class="bi bi-box-arrow-right"></i>
            </a>
        </div>
    </div>

    <!-- Info Toolbar -->
    <div id="info-toolbar" class="alert alert-info alert-dismissible fade show d-none m-2" role="alert">
        <span id="info-toolbar-message"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <!-- Main Content Area avec splitter moderne -->
    <div class="main-content-wrapper">
        <!-- Left Panel - Arborescence (Desktop uniquement) -->
        <aside id="leftPanel" class="left-panel d-none d-lg-flex">
            <div class="panel-content">
                <!-- Header Arborescence -->
                <div class="panel-header">
                    <h6 class="mb-0">
                        <i class="bi bi-folder-tree me-2"></i>
                        <span th:text="#{treearea.header}">Arborescence</span>
                    </h6>
                </div>

                <!-- Arborescence -->
                <div id="arborescentArea" class="panel-body flex-grow-1">
                    <div id="fileTree" th:text="#{error.javascriptengine}">Chargement...</div>
                </div>

                <!-- Details Area -->
                <div id="detailArea" class="panel-footer"></div>
            </div>

            <!-- Splitter / Resize Handle -->
            <div class="panel-splitter" id="treeSplitter">
                <div class="splitter-handle">
                    <i class="bi bi-three-dots-vertical"></i>
                </div>
            </div>
        </aside>

        <!-- Right Panel - Browser Area -->
        <main id="rightPanel" class="right-panel">
            <!-- Browser Main Content -->
            <div id="browserArea" class="browser-content">
                <div id="browserMain"></div>
            </div>
        </main>
    </div>

    <!-- Bottom Toolbar Mobile (Actions rapides) -->
    <div class="d-lg-none bg-light border-top fixed-bottom">
        <div class="btn-group w-100" role="group">
            <button type="button" class="btn btn-light border-0 py-3" id="mobile-toolbar-upload">
                <i class="bi bi-cloud-upload fs-5"></i>
                <div class="small">Upload</div>
            </button>
            <button type="button" class="btn btn-light border-0 py-3" id="mobile-toolbar-new">
                <i class="bi bi-folder-plus fs-5"></i>
                <div class="small">Nouveau</div>
            </button>
            <button type="button" class="btn btn-light border-0 py-3 disabled" id="mobile-toolbar-download">
                <i class="bi bi-download fs-5"></i>
                <div class="small">Download</div>
            </button>
            <button type="button" class="btn btn-light border-0 py-3 disabled" id="mobile-toolbar-more">
                <i class="bi bi-three-dots fs-5"></i>
                <div class="small">Plus</div>
            </button>
        </div>
    </div>

    <!-- Bottom Sheet Actions Mobile (Alternative au menu contextuel) -->
    <div class="modal fade" id="mobileActionsSheet" tabindex="-1" aria-labelledby="mobileActionsSheetLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-bottom modal-sm">
            <div class="modal-content">
                <div class="modal-header">
                    <h6 class="modal-title" id="mobileActionsSheetLabel">Actions</h6>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-0">
                    <div class="list-group list-group-flush">
                        <button class="list-group-item list-group-item-action" data-action="download">
                            <i class="bi bi-download"></i> Télécharger
                        </button>
                        <button class="list-group-item list-group-item-action" data-action="copy">
                            <i class="bi bi-files"></i> Copier
                        </button>
                        <button class="list-group-item list-group-item-action" data-action="cut">
                            <i class="bi bi-scissors"></i> Couper
                        </button>
                        <button class="list-group-item list-group-item-action" data-action="paste">
                            <i class="bi bi-clipboard"></i> Coller
                        </button>
                        <button class="list-group-item list-group-item-action" data-action="rename">
                            <i class="bi bi-pencil"></i> Renommer
                        </button>
                        <button class="list-group-item list-group-item-action text-danger" data-action="delete">
                            <i class="bi bi-trash"></i> Supprimer
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Dialogs cachés -->
    <div id="waitingDialog" class="d-none" th:title="#{ajax.overlay.title}" th:text="#{ajax.overlay.body}"></div>
    <div id="errorDialog" class="d-none" th:title="#{ajax.error.title}">...</div>
    <div id="delete-confirm-ok" class="d-none" th:text="#{delete.confirm.ok}"></div>
    <div id="delete-confirm-cancel" class="d-none" th:text="#{delete.confirm.cancel}"></div>
    <div id="delete-confirm" class="d-none" th:title="#{delete.confirm.title}">
        <p>
            <span class="ui-icon ui-icon-alert"></span>
            <span th:text="#{delete.confirm.message}"></span>
        </p>
    </div>

    <!-- Fonction de changement de langue : ajoute ?lang=xx à l'URL courante -->
    <script>
        function switchLanguage(lang) {
            var url = new URL(window.location.href);
            url.searchParams.set('lang', lang);
            window.location.replace(url.toString());
        }
    </script>
</div>
